let meals={}, checks={}, exp={}, curWeek=0, selDay=null, isGen=false;

function pick(arr,seed){return arr[seed%arr.length];}
function genDay(d){
  const s=d*7;
  const mainIdx=s%POOL.main.length;
  const sideIdx=(s*3)%POOL.side.length;
  const side2Idx=(s*5+4)%POOL.side.length===sideIdx?(s*5+4+1)%POOL.side.length:(s*5+4)%POOL.side.length;
  return {
    lunch:pick(POOL.lunch,s+d%5),
    dinner:[
      POOL.main[mainIdx],
      POOL.side[sideIdx],
      POOL.side[side2Idx],
      pick(POOL.soup,s+d%3)
    ]
  };
}

async function genAll(){
  if(isGen)return;
  isGen=true;
  const btn=document.getElementById('genBtn');
  const prog=document.getElementById('prog');
  const fill=document.getElementById('progFill');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> 生成中...';
  prog.style.display='block';
  for(let d=1;d<=JUNE_DAYS;d++){
    meals[d]=genDay(d);
    fill.style.width=Math.round(d/JUNE_DAYS*100)+'%';
    renderCal();
    await new Promise(r=>setTimeout(r,25));
  }
  isGen=false;
  btn.innerHTML='<i class="ti ti-refresh" aria-hidden="true"></i> 再生成する';
  btn.disabled=false;
  if(selDay)renderDetail(selDay);
  renderWeek();
  renderShop();
}

function renderCal(){
  const c=document.getElementById('calDays');
  let h='';
  for(let i=0;i<DOW0;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=JUNE_DAYS;d++){
    const dow=(DOW0+d-1)%7;
    const m=meals[d];
    h+=`<div class="cal-day${d===TODAY_D?' today':''}${d===selDay?' sel':''}" onclick="clickDay(${d})">
      <div class="dn${dow===0?' sun':dow===6?' sat':''}">${d}</div>
      ${m?`<div class="dm has">${m.lunch.name.slice(0,6)}</div><div class="dm has">${m.dinner[0].name.slice(0,6)}</div>`:`<div class="dm">未生成</div>`}
    </div>`;
  }
  c.innerHTML=h;
}

function clickDay(d){selDay=d;renderCal();renderDetail(d);}

function renderDetail(d){
  const el=document.getElementById('dayDetail');
  if(!meals[d]){el.innerHTML=`<div class="empty-hint"><i class="ti ti-sparkles" aria-hidden="true"></i><br>まず献立を生成してください</div>`;return;}
  const m=meals[d];
  const dow=(DOW0+d-1)%7;
  let dayNut={cal:0,prot:0,fat:0,carb:0};
  [m.lunch,...m.dinner].forEach(ds=>Object.keys(dayNut).forEach(k=>dayNut[k]+=ds.nut[k]));
  Object.keys(dayNut).forEach(k=>dayNut[k]=Math.round(dayNut[k]));
  const targets={cal:1600,prot:80,fat:60,carb:220};
  const nColors={cal:'#1D9E75',prot:'#378ADD',fat:'#EF9F27',carb:'#D4537E'};
  const nLabels={cal:'カロリー',prot:'たんぱく質',fat:'脂質',carb:'炭水化物'};
  const nUnits={cal:'kcal',prot:'g',fat:'g',carb:'g'};

  let h=`<div class="card">
    <div class="card-title"><i class="ti ti-calendar" aria-hidden="true"></i> 6月${d}日（${DJA[dow]}）</div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:4px"><i class="ti ti-sun" aria-hidden="true"></i> 昼ごはん</div>
    ${renderDish(m.lunch,'l'+d,d,'lunch')}
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin:10px 0 8px;display:flex;align-items:center;gap:4px"><i class="ti ti-moon" aria-hidden="true"></i> 夕ごはん</div>
    ${m.dinner.map((ds,i)=>renderDish(ds,'d'+d+'_'+i,d,ds.badge)).join('')}
    <div class="day-nut">
      <div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px">この日の合計栄養（昼＋夕）</div>
      ${Object.entries(dayNut).map(([k,v])=>{
        const pct=Math.min(100,Math.round(v/targets[k]*100));
        return `<div class="bar-row">
          <span class="bar-lbl">${nLabels[k]}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${nColors[k]}"></div></div>
          <span class="bar-val" style="color:${nColors[k]}">${v}${nUnits[k]}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  el.innerHTML=h;
}

  const bl2=badge==='main'?'主菜':badge==='side'?'副菜':badge==='soup'?'汁物':'昼食';
  const open=exp[id];
  return `<div class="dish-wrap">
    <div class="dish-top">
      <span class="badge ${bl}">${bl2}</span>
      <span class="dish-name">${ds.name}</span>

    <div style="text-align:right;margin-top:4px">

        ${open?'閉じる':'材料・作り方を見る'}

}

function sv(v,btn){
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['cal','week','shop'].forEach(n=>document.getElementById('v-'+n).style.display=n===v?'block':'none');
  if(v==='week')renderWeek();
  if(v==='shop')renderShop();
}

    const catTotal=items.reduce((s,i)=>s+i.p,0);
    h+=`<div class="shop-cat">
      <div class="shop-cat-title">${cat} <span style="color:var(--color-text-tertiary)">— 約¥${catTotal.toLocaleString()}</span></div>`;
    items.forEach((item,i)=>{
      const key=cat+i;
      h+=`<div class="shop-item">
        <div class="chk ${checks[key]?'on':''}" onclick="togChk('${key}')" role="checkbox" aria-checked="${!!checks[key]}" aria-label="${item.n}">
          ${checks[key]?`<i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i>`:''}
        </div>
        <span class="iname" style="${checks[key]?'text-decoration:line-through;color:var(--color-text-secondary)':''}">${item.n}</span>
        <span class="iqty">${item.q}</span>
        <span class="iprc">¥${item.p.toLocaleString()}</span>
      </div>`;
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

function togChk(k){checks[k]=!checks[k];renderShop();}

renderCal();
